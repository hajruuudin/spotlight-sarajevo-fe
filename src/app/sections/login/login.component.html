<section class="auth-container bg-(--navbar) rounded-3xl flex flex-col justify-center items-center">

    <img src="/assets/images/LOGO_TEXT_VERTICAL.png" alt="SpotlightSarajevoLogo" class="h-auto w-1/3">
    
    <div class="w-3/4 flex flex-row mt-2 mb-2  justify-between items-center">
        <div class="h-0.5 rounded-2xl w-2/5 bg-white"></div>
        <h2 class="text-2xl font-bold">Log in</h2>
        <div class="h-0.5 rounded-2xl w-2/5 bg-white"></div>
    </div>

    <form [formGroup]="loginForm" class="w-3/4 flex flex-col items-center">
        <input 
        class="w-full h-12 border-t-2 border-l-2 border-r-2 rounded-t-2xl p-2 focus-visible:border-2 focus-visible:outline-0 transition-all mt-2" 
        type="email" 
        name="email" 
        id="email"
        placeholder="Email"
        formControlName="email">

        <input 
        class="w-full h-12 border-2 rounded-b-2xl p-2 focus-visible:border-2 focus-visible:outline-0 transition-all mb-2" 
        type="password" 
        name="password" 
        id="password"
        placeholder="Password"
        formControlName="password">
        
        <button (click)="logInWithSystem()" class="w-full h-14 rounded-xl  bg-(--primary) hover:bg-cyan-600 text-white  outline-amber-50 text-xl font-semibold transition-all duration-75">Log in</button>

        <div class="w-full flex flex-row mt-4 mb-4 justify-between items-center">
            <div class="h-0.5 rounded-2xl w-2/5 bg-white"></div>
            <h2 class="text-2xl font-bold">or</h2>
            <div class="h-0.5 rounded-2xl w-2/5 bg-white"></div>
        </div>

        <button (click)="this.logInWithGoogleCustom()" class="w-full h-14 rounded-xl bg-(--button) hover:bg-(--background) text-white outline-1 outline-white text-xl font-semibold transition-all duration-75 flex flex-row justify-center items-center">
            <img src="/assets/images/GOOGLE.png" alt="Google" class="w-6 h-6 ml-5">
            <span class="flex-grow">Continue with Google</span>
            <img src="/assets/images/GOOGLE.png" alt="Google" class="opacity-0 w-6 h-6 mr-5">
        </button>

    </form>

    <ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="large" color="#00cdc6" type="fire" [fullScreen]="true" style="z-index: 999;" >
        <p style="color: white; font-weight: bold;"> Loading... </p>
    </ngx-spinner>

    <h2 class="text-l mt-6">Don't have an account? <a routerLink="/auth/register"><strong>Register!</strong></a></h2>
</section>
