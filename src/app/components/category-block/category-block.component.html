<div *ngIf="category" id="category-container" class="p-10 hover:p-1 w-48 md:w-64 h-32 md:h-48 rounded-2xl flex flex-row justify-center items-center group" style="background-color: {{category.colorCode}};">
    <p class="text-center text-base md:text-2xl font-bold whitespace-nowrap inline group-hover:hidden">{{this.category.categoryName.toUpperCase()}}</p>
    <p class="text-center hidden group-hover:inline">{{this.category.categoryDescription}}</p>
</div>
