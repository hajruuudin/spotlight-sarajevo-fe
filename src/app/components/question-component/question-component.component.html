<div class="flex flex-col justify-center items-center m-2">
    <h3 class="text-center w-2/4">{{this.question}}</h3>
    <div class="flex flex-row">
        <div
            (click)="onYesClick()"
            class="w-24 h-10 rounded-l-2xl border-r-1 font-bold flex justify-center items-center cursor-pointer {{yesButtonStyle()}} transition-colors duration-200"
        >
            YES
        </div>
        <div
            (click)="onNoClick()"
            class="w-24 h-10 rounded-r-2xl font-bold flex justify-center items-center cursor-pointer {{noButtonStyle()}} transition-colors duration-200"
        >
            NO
        </div>
    </div>
</div>
