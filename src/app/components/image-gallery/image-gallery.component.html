<div class="w-full mx-auto max-w-3xl bg-(--navbar) p-2 rounded-2xl">
  <!-- Main Image Thumbnail -->
  <div class="w-full aspect-[4/3] overflow-hidden rounded-xl cursor-pointer" (click)="openPreview(0)">
    <img [src]="thumbnailImage" alt="Thumbnail" class="w-full h-full object-cover" />
  </div>

  <!-- Scrollable Thumbnails (dimmed, not clickable) -->
  <div class="mt-4 flex gap-3 overflow-x-auto" *ngIf="images.length > 1">
    <div
      class="w-24 aspect-square rounded-md overflow-hidden pointer-events-none"
      *ngFor="let img of images.slice(1)"
    >
      <img [src]="img" class="w-full h-full object-cover" />
    </div>
  </div>

  <!-- Fullscreen Preview -->
  <div
    class="fixed inset-0 bg-black bg-opacity-90 z-999 flex items-center justify-center"
    *ngIf="previewOpen"
    (click)="closePreview()"
  >
    <button
      class="absolute left-4 text-white text-4xl font-bold z-50"
      (click)="prev(); $event.stopPropagation();"
    >
      ‹
    </button>

    <img
      [src]="images[currentIndex]"
      alt="Preview"
      class="max-w-[90%] max-h-[90%] object-contain"
    />

    <button
      class="absolute right-4 text-white text-4xl font-bold z-50"
      (click)="next(); $event.stopPropagation();"
    >
      ›
    </button>

    <!-- Optional: Close Button -->
    <button
      class="absolute top-4 right-4 text-white text-2xl"
      (click)="closePreview(); $event.stopPropagation();"
    >
      ✕
    </button>
  </div>
</div>
