<main class="authentication h-screen w-full flex flex-row justify-center items-center relative overflow-hidden">
    <img src="/assets/backgrounds/AUTH_BG_1.png" alt="" class="absolute self-end -z-50 scale-110" id="parallaxBg">
    <img src="/assets/backgrounds/AUTH_BG_2.png" alt="" class="absolute self-end -z-40 scale-110" id="parallaxFg">
    
    <section class="auth-container w-2/5 h-3/4 bg-(--navbar) rounded-3xl flex flex-col justify-center items-center ">
        <img src="/assets/images/LOGO_TEXT_HORIZONTAL.png" alt="SpotlightSarajevoLogo" class="h-auto w-4/5">

        <!-- <h1 class="text-4xl kumbh-sans-label">Log in</h1> -->

        <form [formGroup]="loginForm" class="w-3/4 flex flex-col items-center">
            <input 
            class="w-full h-12 border-2 rounded-xl p-2 focus-visible:border-2 focus-visible:outline-0 transition-all mt-2 mb-2" 
            type="text" 
            name="username" 
            id="username"
            placeholder="Username"
            formControlName="username">

            <input 
            class="w-full h-12 border-2 rounded-xl p-2 focus-visible:border-2 focus-visible:outline-0 transition-all mt-2 mb-2" 
            type="password" 
            name="password" 
            id="password"
            placeholder="Password"
            formControlName="password">
           
            <div class="flex flex-row w-full justify-between">
                <button class="w-1/2 h-14 rounded-xl mr-1 mt-1 bg-white text-cyan-800 text-2xl font-semibold hover:w-2/3 transition-all duration-75">Log in</button>
                <button class="w-1/2 h-14 rounded-xl ml-2 mt-1 bg-white text-cyan-800 text-2xl font-semibold hover:w-2/3 transition-all duration-75 flex flex-row justify-center items-center">
                    <img src="/assets/images/GOOGLE.png" alt="Google" class="w-6 h-6">
                    oogle</button>
            </div>
        </form>

        <h2 class="text-xl mt-6">Don't have an account? <strong>Register!</strong></h2>
    </section>
</main>
